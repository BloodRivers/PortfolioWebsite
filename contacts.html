<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | Contacts</title>
  <meta name="description" content="Contact details and communication channels for the portfolio website.">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="contacts">
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark"></span>
        <span>Fawnyac</span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html" data-nav="home">Home</a>
        <a href="bio.html" data-nav="bio">Bio</a>
        <a href="projects.html" data-nav="projects">Projects</a>
        <a href="contacts.html" data-nav="contacts">Contacts</a>
      </nav>
    </header>

    <main class="content-page">
      <section class="hero">
        <div class="hero-copy page-intro" data-tilt>
          <p class="eyebrow">Contacts</p>
          <h1>Let's get in touch</h1>
          <p>
            Reach out through any channel below.
          </p>
        </div>

        <aside class="hero-panel hero-panel-profile">
          <div class="profile-content">
            <img src="assets/images/self/Selfie3.png" alt="Fawnyac" class="profile-image">
            <div class="profile-overlay">
              <p class="profile-text">
                Available for collaboration and interesting projects.<br>
                <a href="index.html" class="profile-link">Back to Home →</a>
              </p>
            </div>
          </div>
        </aside>
      </section>

      <section class="contact-grid">
        <a class="card contact-card" href="mailto:contact@fawnyac.dev" data-tilt>
          <img src="assets/images/icons/Gmail.png" alt="" class="card-icon">
          <p class="card-label">Email</p>
          <div class="tag-row">
            <span class="steam-tag">Formal</span>
            <span class="steam-tag">Slow response</span>
          </div>
        </a>

        <a class="card contact-card" href="https://github.com/fawnyac" data-tilt>
          <img src="assets/images/icons/Github.svg" alt="" class="card-icon">
          <p class="card-label">GitHub</p>
          <div class="tag-row">
            <span class="steam-tag">Public</span>
            <span class="steam-tag">Technical</span>
          </div>
        </a>

        <a class="card contact-card" href="https://t.me/Fawnyac" data-tilt>
          <img src="assets/images/icons/Telegram.webp" alt="" class="card-icon">
          <p class="card-label">Telegram</p>
          <div class="tag-row">
            <span class="steam-tag">Fast response</span>
            <span class="steam-tag">Casual</span>
          </div>
        </a>

        <a class="card contact-card" href="https://discord.com/users/727525576272904262" data-tilt>
          <img src="assets/images/icons/Discord.svg" alt="" class="card-icon">
          <p class="card-label">Discord</p>
          <div class="tag-row">
            <span class="steam-tag">Community</span>
            <span class="steam-tag">Fast response</span>
          </div>
        </a>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
